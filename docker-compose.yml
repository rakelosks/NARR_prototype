services:

  # ── FastAPI backend ──────────────────────────────────────────────
  api:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - .:/app                          # live-reload in development
      - narr_data:/app/data/cache       # persist parquet cache
      - narr_db:/app/db                 # persist SQLite outside code dir
    env_file:
      - .env
    environment:
      - METADATA_DB_PATH=/app/db/metadata.sqlite
      - CACHE_DIR=/app/data/cache/snapshots
      - OLLAMA_BASE_URL=http://ollama:11434
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── Streamlit frontend ──────────────────────────────────────────
  streamlit:
    build: .
    ports:
      - "8501:8501"
    volumes:
      - .:/app                          # live-reload in development
    env_file:
      - .env
    environment:
      - API_BASE_URL=http://api:8000    # inter-container networking
    depends_on:
      api:
        condition: service_healthy
    command: >
      streamlit run client/streamlit_app.py
      --server.port 8501
      --server.address 0.0.0.0
      --server.headless true

  # ── Ollama LLM server (optional) ────────────────────────────────
  # Only needed when LLM_PROVIDER=ollama.
  # To use OpenAI instead, set LLM_PROVIDER=openai in .env
  # and leave this service stopped.
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama       # persist downloaded models
    profiles:
      - ollama                          # opt-in: docker compose --profile ollama up

volumes:
  narr_data:        # parquet cache
  narr_db:          # SQLite database
  ollama_data:      # Ollama model weights
